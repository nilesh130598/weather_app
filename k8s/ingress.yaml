apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: weather-ingress
  namespace: weather-app
spec: 
    ingressClassName: nginx

    rules: 
    - host: weather-local
      http:
        paths:
        - path: /
          pathType: prefix
          backend: 
            service:
              name: frontend-service
              port:
                number: 80